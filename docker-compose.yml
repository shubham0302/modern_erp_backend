services:
  redis:
    image: redis:7-alpine
    container_name: modern_erp_redis
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    expose:
      - '6379'
    volumes:
      - modern_erp_redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - modern_erp

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: modern-erp/migrator:latest
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run migration:run
    networks:
      - modern_erp
    profiles:
      - tools

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    image: modern-erp/gateway:latest
    container_name: modern_erp_gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      ADMIN_URL: admin:5001
      STAFF_URL: staff:5002
      INVENTORY_URL: inventory:5003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '${GATEWAY_PORT}:${GATEWAY_PORT}'
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
      admin:
        condition: service_started
      staff:
        condition: service_started
      inventory:
        condition: service_started
    networks:
      - modern_erp

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: admin
    image: modern-erp/admin:latest
    container_name: modern_erp_admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      ADMIN_URL: 0.0.0.0:5001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - modern_erp

  staff:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: staff
    image: modern-erp/staff:latest
    container_name: modern_erp_staff
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      STAFF_URL: 0.0.0.0:5002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - modern_erp

  inventory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: inventory
    image: modern-erp/inventory:latest
    container_name: modern_erp_inventory
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: redis
      INVENTORY_URL: 0.0.0.0:5003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - modern_erp

networks:
  modern_erp:
    driver: bridge

volumes:
  modern_erp_redisdata:
