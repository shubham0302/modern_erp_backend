version: v2
plugins:
  - local: ./node_modules/.bin/protoc-gen-ts_proto
    out: libs/grpc-types/src/generated
    opt:
      - nestJs=true
      - outputServices=grpc-js
      - env=node
      - useExactTypes=false
      - esModuleInterop=true
      - addGrpcMetadata=true
      - returnObservable=false
