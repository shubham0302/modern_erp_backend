syntax = "proto3";
package inventory;

service InventoryService {
  // Size CRUD
  rpc ListSizes (ListSizesRequest) returns (ListSizesResponse);
  rpc GetSize (GetSizeRequest) returns (SizeResponse);
  rpc CreateSize (CreateSizeRequest) returns (SizeResponse);
  rpc UpdateSize (UpdateSizeRequest) returns (SizeResponse);
  rpc DeleteSize (DeleteSizeRequest) returns (SuccessResponse);
  rpc RestoreSize (RestoreSizeRequest) returns (SizeResponse);

  // Finish CRUD
  rpc ListFinishes (ListFinishesRequest) returns (ListFinishesResponse);
  rpc GetFinish (GetFinishRequest) returns (FinishResponse);
  rpc CreateFinish (CreateFinishRequest) returns (FinishResponse);
  rpc UpdateFinish (UpdateFinishRequest) returns (FinishResponse);
  rpc DeleteFinish (DeleteFinishRequest) returns (SuccessResponse);
  rpc RestoreFinish (RestoreFinishRequest) returns (FinishResponse);

  // Size <-> Finish mapping
  rpc AddFinishToSize (AddFinishToSizeRequest) returns (SizeFinishResponse);
  rpc RemoveFinishFromSize (RemoveFinishFromSizeRequest) returns (SuccessResponse);
  rpc ListSizeFinishesBySize (ListSizeFinishesBySizeRequest) returns (ListSizeFinishesResponse);
  rpc ListSizeFinishesByFinish (ListSizeFinishesByFinishRequest) returns (ListSizeFinishesResponse);
  rpc ListAllSizeFinishes (ListAllSizeFinishesRequest) returns (ListAllSizeFinishesResponse);

  // Series CRUD
  rpc ListSeries (ListSeriesRequest) returns (ListSeriesResponse);
  rpc GetSeries (GetSeriesRequest) returns (SeriesResponse);
  rpc CreateSeries (CreateSeriesRequest) returns (SeriesResponse);
  rpc UpdateSeries (UpdateSeriesRequest) returns (SeriesResponse);
  rpc DeleteSeries (DeleteSeriesRequest) returns (SuccessResponse);
  rpc RestoreSeries (RestoreSeriesRequest) returns (SeriesResponse);

  // Series <-> SizeFinish mapping
  rpc AddSeriesToSizeFinish (AddSeriesToSizeFinishRequest) returns (SeriesSizeFinishResponse);
  rpc RemoveSeriesFromSizeFinish (RemoveSeriesFromSizeFinishRequest) returns (SuccessResponse);
  rpc ListSeriesSizeFinishesBySeries (ListSeriesSizeFinishesBySeriesRequest) returns (ListSeriesSizeFinishesResponse);

  // Design CRUD
  rpc ListDesigns (ListDesignsRequest) returns (ListDesignsResponse);
  rpc GetDesign (GetDesignRequest) returns (DesignResponse);
  rpc CreateDesign (CreateDesignRequest) returns (DesignResponse);
  rpc UpdateDesign (UpdateDesignRequest) returns (DesignResponse);
  rpc DeleteDesign (DeleteDesignRequest) returns (SuccessResponse);
  rpc RestoreDesign (RestoreDesignRequest) returns (DesignResponse);
  rpc ApproveDesign (ApproveDesignRequest) returns (DesignResponse);
  rpc RejectDesign (RejectDesignRequest) returns (DesignResponse);
}

// ----- Common -----

message SuccessResponse {
  bool success = 1;
}

// ----- Size -----

message Size {
  string id = 1;
  string name = 2;
  bool is_active = 3;
  string created_at = 4;
  string updated_at = 5;
  // User id of the last actor who created/updated/soft-deleted/restored this row.
  string updated_by = 6;
  // Which platform that actor belongs to ("admin" or "staff"). Empty for legacy rows.
  string updated_by_platform = 7;
  // Display name of the actor at the time of the last write. Empty for legacy rows.
  string updated_by_name = 8;
}

message SizeResponse {
  Size item = 1;
}

message ListSizesRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  bool fetch_all = 4;
  optional bool active_only = 5;
}

message ListSizesResponse {
  repeated Size items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetSizeRequest {
  string id = 1;
}

message CreateSizeRequest {
  string name = 1;
}

message UpdateSizeRequest {
  string id = 1;
  optional string name = 2;
  optional bool is_active = 3;
}

message DeleteSizeRequest {
  string id = 1;
}

message RestoreSizeRequest {
  string id = 1;
}

// ----- Finish -----

message Finish {
  string id = 1;
  string name = 2;
  bool is_active = 3;
  string created_at = 4;
  string updated_at = 5;
  // Populated by ListFinishes and GetFinish. Other endpoints leave this empty.
  repeated Size sizes = 6;
  // User id of the last actor who created/updated/soft-deleted/restored this row.
  string updated_by = 7;
  // Which platform that actor belongs to ("admin" or "staff"). Empty for legacy rows.
  string updated_by_platform = 8;
  // Display name of the actor at the time of the last write. Empty for legacy rows.
  string updated_by_name = 9;
}

message FinishResponse {
  Finish item = 1;
}

message ListFinishesRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
}

message ListFinishesResponse {
  repeated Finish items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetFinishRequest {
  string id = 1;
}

message CreateFinishRequest {
  string name = 1;
  repeated string size_ids = 2;
}

message UpdateFinishRequest {
  string id = 1;
  optional string name = 2;
  optional bool is_active = 3;
  // Sizes to add as new (size, finish) mappings. Idempotent for already-mapped sizes.
  repeated string size_ids = 4;
  // Sizes whose mapping with this finish should be soft-deleted.
  // Cascades through SeriesSizeFinish and Design.
  repeated string deleted_size_ids = 5;
}

message DeleteFinishRequest {
  string id = 1;
}

message RestoreFinishRequest {
  string id = 1;
}

// ----- SizeFinish (Size x Finish mapping) -----

message SizeFinish {
  string id = 1;
  Size size = 2;
  Finish finish = 3;
  bool is_active = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SizeFinishResponse {
  SizeFinish item = 1;
}

message ListSizeFinishesResponse {
  repeated SizeFinish items = 1;
}

message AddFinishToSizeRequest {
  string size_id = 1;
  string finish_id = 2;
}

message RemoveFinishFromSizeRequest {
  string size_finish_id = 1;
}

message ListSizeFinishesBySizeRequest {
  string size_id = 1;
}

message ListSizeFinishesByFinishRequest {
  string finish_id = 1;
}

message ListAllSizeFinishesRequest {
  int32 page = 1;
  int32 limit = 2;
  bool fetch_all = 3;
  optional bool active_only = 4;
}

message ListAllSizeFinishesResponse {
  repeated SizeFinish items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

// ----- Series -----

message Series {
  string id = 1;
  string name = 2;
  bool is_active = 3;
  string created_at = 4;
  string updated_at = 5;
  // Populated by ListSeries and GetSeries. Other endpoints leave this empty.
  repeated SizeFinish size_finishes = 6;
  // User id of the last actor who created/updated/soft-deleted/restored this row.
  string updated_by = 7;
  // Which platform that actor belongs to ("admin" or "staff"). Empty for legacy rows.
  string updated_by_platform = 8;
  // Display name of the actor at the time of the last write. Empty for legacy rows.
  string updated_by_name = 9;
}

message SeriesResponse {
  Series item = 1;
}

message ListSeriesRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
}

message ListSeriesResponse {
  repeated Series items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetSeriesRequest {
  string id = 1;
}

message CreateSeriesRequest {
  string name = 1;
  // (size, finish) mapping ids to bind to this series at creation. Each becomes
  // a SeriesSizeFinish row in the same transaction; mismatched ids throw SIZE_FINISH_NOT_FOUND.
  repeated string size_finish_ids = 2;
}

message UpdateSeriesRequest {
  string id = 1;
  optional string name = 2;
  optional bool is_active = 3;
  // SizeFinish ids to add as new (series, size, finish) combinations.
  // Idempotent for already-mapped pairs.
  repeated string size_finish_ids = 4;
  // SizeFinish ids whose mapping with this series should be soft-deleted.
  // Cascades through Design.
  repeated string deleted_size_finish_ids = 5;
}

message DeleteSeriesRequest {
  string id = 1;
}

message RestoreSeriesRequest {
  string id = 1;
}

// ----- SeriesSizeFinish (Series x SizeFinish mapping) -----

message SeriesSizeFinish {
  string id = 1;
  Series series = 2;
  SizeFinish size_finish = 3;
  bool is_active = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SeriesSizeFinishResponse {
  SeriesSizeFinish item = 1;
}

message ListSeriesSizeFinishesResponse {
  repeated SeriesSizeFinish items = 1;
}

message AddSeriesToSizeFinishRequest {
  string series_id = 1;
  string size_finish_id = 2;
}

message RemoveSeriesFromSizeFinishRequest {
  string series_size_finish_id = 1;
}

message ListSeriesSizeFinishesBySeriesRequest {
  string series_id = 1;
}

// ----- Design -----

message Design {
  string id = 1;
  string name = 2;
  // Optional thumbnail URL. Empty when unset.
  string thumbnail_url = 3;
  Series series = 4;
  repeated SizeFinish size_finishes = 5;
  bool is_active = 6;
  string created_at = 7;
  string updated_at = 8;
  // Workflow state. One of: "pending", "approved", "rejected".
  string status = 9;
  // ISO timestamp of the most recent transition into "approved". Empty otherwise.
  string approved_at = 10;
  // Append-only history of status transitions, oldest first.
  repeated DesignStatusEntry status_history = 11;
  // Reason supplied with the most recent rejection. Cleared when approved.
  string rejection_reason = 12;
  // Actor who first created this design. Empty for legacy rows.
  string created_by = 13;
  string created_by_name = 14;
  // Actor who last transitioned this design into "approved". Empty when never approved.
  string approved_by = 15;
  string approved_by_name = 16;
  // Actor of the last write (create/update/approve/reject/restore).
  string updated_by = 17;
  string updated_by_name = 18;
}

message DesignStatusEntry {
  string status = 1;
  string date = 2;
  // Set only when status = "rejected".
  string reason = 3;
}

message DesignResponse {
  Design item = 1;
}

message ListDesignsRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
  string series_id = 4;
  string size_finish_id = 5;
}

message ListDesignsResponse {
  repeated Design items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message GetDesignRequest {
  string id = 1;
}

message CreateDesignRequest {
  string name = 1;
  // Optional thumbnail URL. Empty string means unset.
  string thumbnail_url = 2;
  string series_id = 3;
  // SizeFinish ids the design covers. Each must be bound to series_id via
  // SeriesSizeFinish, otherwise SERIES_SIZE_FINISH_NOT_FOUND.
  repeated string size_finish_ids = 4;
}

message UpdateDesignRequest {
  string id = 1;
  optional string name = 2;
  optional bool is_active = 3;
  // Pass empty string to clear; omit to leave unchanged.
  optional string thumbnail_url = 4;
  optional string series_id = 5;
  // When non-empty, replaces the design's SizeFinish set. Empty leaves it unchanged.
  repeated string size_finish_ids = 6;
}

message DeleteDesignRequest {
  string id = 1;
}

message RestoreDesignRequest {
  string id = 1;
}

message ApproveDesignRequest {
  string id = 1;
}

message RejectDesignRequest {
  string id = 1;
  string reason = 2;
}
